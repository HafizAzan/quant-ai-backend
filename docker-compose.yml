services:
  postgres:
    image: postgres:16-alpine
    container_name: quantai-postgres
    environment:
      POSTGRES_USER: quantai
      POSTGRES_PASSWORD: quantai
      POSTGRES_DB: quantai
    ports:
      - "5432:5432"
    volumes:
      - quantai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantai -d quantai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: quantai-redis
    ports:
      - "6379:6379"
    volumes:
      - quantai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  quantai_pg_data:
  quantai_redis_data:
